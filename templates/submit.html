<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prediction Result</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #122033;
      background: #eef4f7;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }

    main {
      width: min(620px, 100%);
      background: #ffffff;
      border-radius: 8px;
      padding: 36px;
      text-align: center;
      box-shadow: 0 16px 38px rgba(18, 32, 51, 0.14);
    }

    h1 {
      color: #0b4f6c;
      margin-bottom: 22px;
      font-size: 2rem;
    }

    .result {
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 26px;
      font-size: clamp(1.8rem, 6vw, 2.6rem);
      font-weight: 800;
    }

    .approved {
      color: #17633a;
      background: #e9f7ef;
    }

    .rejected {
      color: #9a281f;
      background: #fdecec;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    a {
      min-height: 46px;
      border-radius: 6px;
      padding: 0 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
    }

    .primary {
      background: #0b4f6c;
      color: #ffffff;
    }

    .secondary {
      background: #e3edf2;
      color: #0b4f6c;
    }
  </style>
</head>
<body>
  <main>
    <h1>Prediction Result</h1>
    <div class="result {{ status }}">
      {{ prediction }}
    </div>
    <div class="actions">
      <a class="primary" href="/predict">Predict Again</a>
      <a class="secondary" href="/">Home</a>
    </div>
  </main>
</body>
</html>
