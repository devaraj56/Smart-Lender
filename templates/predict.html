<!DOCTYPE html>
<html>
<head>

<title>Loan Prediction</title>

<style>

body{

background:#edf2f7;
font-family:Segoe UI;

}

.container{

width:700px;
margin:auto;
margin-top:30px;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0px 10px 25px rgba(0,0,0,.2);

}

h2{

text-align:center;
color:#1565c0;
margin-bottom:30px;

}

input,select{

width:100%;
padding:12px;
margin-top:10px;
margin-bottom:18px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;

}

button{

width:100%;
padding:15px;
font-size:20px;
background:#1565c0;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
transition:.4s;

}

button:hover{

background:#0d47a1;

}

</style>

</head>

<body>

<div class="container">

<h2>Loan Prediction Form</h2>

<form action="/submit" method="POST">

<select name="Gender">
<option value="1">Male</option>
<option value="0">Female</option>
</select>

<select name="Married">
<option value="1">Married</option>
<option value="0">Not Married</option>
</select>

<input type="number" name="Dependents" placeholder="Dependents (0-3)" required>

<select name="Education">
<option value="0">Graduate</option>
<option value="1">Not Graduate</option>
</select>

<select name="Self_Employed">
<option value="1">Self Employed</option>
<option value="0">Not Self Employed</option>
</select>

<input type="number" name="ApplicantIncome" placeholder="Applicant Income">

<input type="number" name="CoapplicantIncome" placeholder="Coapplicant Income">

<input type="number" name="LoanAmount" placeholder="Loan Amount">

<input type="number" name="Loan_Amount_Term" placeholder="Loan Term (360)">

<select name="Credit_History">
<option value="1">Good Credit History</option>
<option value="0">Bad Credit History</option>
</select>

<select name="Property_Area">

<option value="0">Rural</option>
<option value="1">Semi Urban</option>
<option value="2">Urban</option>

</select>

<button>

Predict Loan Status

</button>

</form>

</div>

</body>

</html>
